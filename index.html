!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  max-width: 600px;
  margin: 40px auto;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input {
  display: block;
  width: 100%;
  padding: 8px;
  margin: 8px 0;
}

button {
  padding: 8px 12px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 5px;
}

li {
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>Team Scheduler</h2>

<input id="name" placeholder="Team Leader">
<input id="person" placeholder="Person">
<input id="date" type="date">
<input id="time" type="time">

<button onclick="add()">Add</button>

<h3>Appointments</h3>
<ul id="list"></ul>

</div>

<script>
async function add() {
  const name = document.getElementById('name').value;
  const person = document.getElementById('person').value;
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;

  const datetime = new Date(date + "T" + time);

  await fetch('/appointments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: name,
      person: person,
      datetime: datetime.toISOString()
    })
  });

  load();
}

async function load() {
  const res = await fetch('/appointments');
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(a => {
    const li = document.createElement('li');

    const localTime = new Date(a.datetime).toLocaleString();
    li.textContent = a.person + ": " + a.name + " - " + localTime;

    const btn = document.createElement('button');
    btn.textContent = " Delete";

    btn.onclick = async () => {
      await fetch('/appointments/' + a.id, { method: 'DELETE' });
      load();
    };

    li.appendChild(btn);
    list.appendChild(li);
  });
}

load();
</script>

</body>
</html>
